      in: path
      name: workspaceUuid
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    accountUuid:
      description: UUID of the social media account.
      explode: false
      in: path
      name: accountUuid
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    mediaUuid:
      description: UUID of the media asset.
      explode: false
      in: path
      name: mediaUuid
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    tagUuid:
      description: UUID of the tag.
      explode: false
      in: path
      name: tagUuid
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    postUuid:
      description: UUID of the post.
      explode: false
      in: path
      name: postUuid
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    userId:
      description: ID of the user.
