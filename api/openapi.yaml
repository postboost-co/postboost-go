    receiptUuid:
      description: UUID of the receipt.
      explode: false
      in: path
      name: receiptUuid
      required: true
      schema:
        format: uuid
        type: string
      style: simple
  responses:
    Unauthorized:
      content:
        application/json:
          schema:
            properties:
              message:
                example: Unauthenticated.
                type: string
      description: Missing or invalid API token.
    Forbidden:
      content:
        application/json:
          schema:
            properties:
              message:
                example: Access forbidden.
                type: string
      description: Insufficient permissions.
    NotFound:
      content:
        application/json:
          schema:
            properties:
              message:
                example: Not found.
                type: string
      description: Resource not found.
    ValidationError:
      content:
        application/json:
          schema:
            properties:
              message:
                example: Validation errors.
                type: string
              errors:
                additionalProperties:
                  items:
                    type: string
      description: Validation failed.
    SuccessResponse:
      content:
        application/json:
          schema:
            properties:
              success:
                example: true
                type: boolean
      description: Operation succeeded.
