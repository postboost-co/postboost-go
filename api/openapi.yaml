  /{workspaceUuid}/ai/blog-to-social:
    post:
      description: |
        Generates platform-specific social media captions from a blog post URL or
        directly provided title and excerpt. Each platform generates one caption,
        which consumes one AI credit from the workspace's monthly allowance.

        **Input modes** (at least one required):
        - **URL mode**: provide `url` and the API scrapes the blog content automatically, including detecting the featured image via `og:image`.
        - **Direct mode**: provide `title` and `excerpt` directly (no scraping).

        If both are provided, direct values take priority.

        When `create_post` is `true`, a draft post is created in the workspace with
        per-account caption versions. If an image is available (from `image_url` or
        the scraped `og:image`), it is imported into the workspace media library and
        attached to the draft post.
      operationId: blogToSocial
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      requestBody:
        content:
          application/json:
            examples:
              url_mode:
                summary: URL mode
                value:
                  url: https://example.com/blog/my-post
                  platforms:
                  - twitter
                  - linkedin
                  tone: professional
                  hashtags: few
                  create_post: false
              direct_mode:
                summary: Direct mode
                value:
                  title: 10 Tips for Better Social Media
                  excerpt: Social media success starts with consistency...
                  image_url: https://example.com/images/post-cover.jpg
                  platforms:
                  - instagram
                  - linkedin
                  tone: friendly
                  cta: link
                  create_post: true
            schema:
              $ref: '#/components/schemas/BlogToSocialInput'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/blogToSocial_200_response'
          description: Captions generated successfully
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "422":
          $ref: '#/components/responses/ValidationError'
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/blogToSocial_429_response'
          description: AI credits exhausted for this billing period
      summary: Generate social media captions from a blog post
      tags:
      - AI
  /{workspaceUuid}/ai/image-prompt:
    post:
      description: |
        Builds a professional image generation prompt from a caption and platform.
        No image is generated. Use this to preview the prompt before calling
        `image-generate`. Costs 1 AI credit per call.

        When `image-generate` builds the prompt internally (standard mode),
        no credit is charged for the prompt step.
      operationId: imagePrompt
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImagePromptInput'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/imagePrompt_200_response'
          description: Prompt built successfully
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/ValidationError'
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/imagePrompt_429_response'
          description: AI credits exhausted for this billing period
      summary: Build an optimized image prompt from a social media caption
      tags:
      - AI
  /{workspaceUuid}/ai/image-generate:
    post:
      description: |
        Generates one or more images and saves them immediately to the workspace
        media library.

        **Standard mode** (recommended): provide `caption` + `platform`. PostBoost
        builds a professional image prompt internally using platform-specific
        templates. No prompt engineering required.

        **Developer mode**: provide `prompt` directly to bypass prompt building.
        If both `caption` and `prompt` are sent, standard mode runs.

        Credits: `count x credit_weight` (default: 5 per image).
      operationId: imageGenerate
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      requestBody:
        content:
          application/json:
            examples:
              standard_mode:
                summary: Standard mode (social media manager)
                value:
                  caption: "Our summer sale starts today, 30% off everything!"
                  platform: instagram
                  template: product_highlight
                  aspect_ratio: 1:1
                  count: 2
              developer_mode:
                summary: Developer mode (explicit prompt)
                value:
                  prompt: "A vibrant summer beach scene with colorful umbrellas, high\
                    \ contrast, Instagram-optimized."
                  aspect_ratio: 1:1
            schema:
              $ref: '#/components/schemas/ImageGenerateInput'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/imageGenerate_200_response'
          description: Images generated and saved to media library
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/ValidationError'
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/imageGenerate_429_response'
          description: AI credits exhausted for this billing period
      summary: Generate social media images from a caption
      tags:
      - AI
  /{workspaceUuid}/ai/image-edit:
    post:
      description: |
        Edits an existing workspace media item using the source image and a text
        prompt. Optionally accepts a mask (transparent areas are replaced).
        Saves results to the media library. Credits: `count × credit_weight`.
      operationId: imageEdit
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageEditInput'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/imageGenerate_200_response'
          description: Images edited and saved to media library
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/ValidationError'
        "429":
          $ref: '#/components/responses/InsufficientCredits'
      summary: Edit an existing media image using AI
      tags:
      - AI
  /{workspaceUuid}/ai/image-variations:
    post:
      description: |
        Creates one or more variations of an existing workspace media item.
        Saves results to the media library.
        Credits: `count × credit_weight`.
      operationId: imageVariations
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageVariationsInput'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/imageVariations_200_response'
          description: Variations generated and saved to media library
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/ValidationError'
        "429":
          $ref: '#/components/responses/InsufficientCredits'
      summary: Generate variations of an existing media image
      tags:
      - AI
  /{workspaceUuid}/ai/image-alt-text:
    post:
      description: |
        Analyzes an existing workspace media item and generates accessible alt text.
        The alt text is saved back to the media record.
        Costs 1 AI credit per call.
      operationId: imageAltText
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageAltTextInput'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/imageAltText_200_response'
          description: Alt text generated and saved to media record
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/ValidationError'
        "429":
          $ref: '#/components/responses/InsufficientCredits'
      summary: Generate alt text for a media image using AI
      tags:
      - AI
components:
  parameters:
    workspaceUuid:
      description: UUID of the workspace.
      explode: false
      in: path
      name: workspaceUuid
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    accountUuid:
      description: UUID of the social media account.
      explode: false
      in: path
      name: accountUuid
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    mediaUuid:
      description: UUID of the media asset.
      explode: false
      in: path
      name: mediaUuid
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    tagUuid:
      description: UUID of the tag.
      explode: false
      in: path
      name: tagUuid
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    postUuid:
      description: UUID of the post.
      explode: false
      in: path
      name: postUuid
      required: true
      schema:
        format: uuid
        type: string
      style: simple
    userId:
      description: ID of the user.
      explode: false
      in: path
      name: userId
      required: true
      schema:
        type: integer
      style: simple
    receiptUuid:
      description: UUID of the receipt.
      explode: false
      in: path
      name: receiptUuid
      required: true
      schema:
        format: uuid
        type: string
      style: simple
  responses:
    Unauthorized:
      content:
        application/json:
          schema:
            properties:
              message:
                example: Unauthenticated.
                type: string
      description: Missing or invalid API token.
    Forbidden:
      content:
        application/json:
          schema:
            properties:
              message:
                example: Access forbidden.
                type: string
      description: Insufficient permissions.
    NotFound:
      content:
        application/json:
          schema:
            properties:
              message:
                example: Not found.
                type: string
      description: Resource not found.
    ValidationError:
      content:
        application/json:
          schema:
            properties:
              message:
                example: Validation errors.
                type: string
              errors:
                additionalProperties:
                  items:
                    type: string
      description: Validation failed.
    InsufficientCredits:
      content:
        application/json:
          schema:
            properties:
