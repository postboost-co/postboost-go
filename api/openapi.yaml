openapi: 3.1.0
info:
  contact:
    email: hi@postboost.co
    name: PostBoost Support
    url: https://postboost.co
  description: |
    The PostBoost REST API lets you publish, schedule, and analyze social media posts
    across 12+ platforms from a single integration. No OAuth apps to maintain —
    PostBoost handles platform authorization for you.

    ## Base URL
    All workspace-scoped endpoints are prefixed with `/{workspaceUuid}`.
    Panel/admin endpoints are prefixed with `/panel`.

    ## Authentication
    All requests require a Bearer token in the `Authorization` header.
    Generate tokens in your PostBoost dashboard under **Settings → Access Tokens**.

    ```
    Authorization: Bearer YOUR_API_TOKEN
    ```
  license:
    name: Commercial
    url: https://postboost.co/pages/terms
  title: PostBoost API
  version: 1.0.0
servers:
- description: Production
  url: https://postboost.co/app/api
security:
- bearerAuth: []
tags:
- description: Social media accounts connected to a workspace.
  name: Accounts
- description: Upload and manage media assets in the workspace library.
  name: Media
- description: Organize posts with color-coded tags.
  name: Tags
- description: "Create, schedule, and publish posts across platforms."
  name: Posts
- description: Manage workspaces (admin only).
  name: Workspaces
- description: Manage workspace subscriptions and billing (admin only).
  name: Subscriptions
- description: Manage users across the platform (admin only).
  name: Users
- description: Manage billing receipts (admin only).
  name: Receipts
- description: AI-powered content generation tools. Each generation call counts against
    the workspace AI credit limit.
  name: AI
paths:
  /{workspaceUuid}/accounts:
    get:
      description: Returns all social media accounts connected to the workspace.
      operationId: listAccounts
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listAccounts_200_response'
          description: List of accounts
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
      summary: List accounts
      tags:
      - Accounts
  /{workspaceUuid}/accounts/{accountUuid}:
    get:
      description: Returns a single social media account.
      operationId: getAccount
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      - $ref: '#/components/parameters/accountUuid'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
          description: Account details
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Get account
      tags:
      - Accounts
  /{workspaceUuid}/media:
    delete:
      description: Delete one or more media items by their IDs.
      operationId: deleteMediaBulk
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/deleteMediaBulk_request'
        required: true
      responses:
        "200":
          $ref: '#/components/responses/SuccessResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
      summary: Delete media (bulk)
      tags:
      - Media
    get:
      description: Returns a paginated list of media assets in the workspace library.
      operationId: listMedia
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      - description: Page number (20 items per page).
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listMedia_200_response'
          description: Paginated list of media
        "401":
          $ref: '#/components/responses/Unauthorized'
      summary: List media
      tags:
      - Media
    post:
      description: Upload a file directly as multipart form data.
      operationId: uploadMedia
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/uploadMedia_request'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Media'
          description: Uploaded media object
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/ValidationError'
      summary: Upload media (binary)
      tags:
      - Media
  /{workspaceUuid}/media/{mediaUuid}:
    get:
      description: Returns a single media asset.
      operationId: getMedia
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      - $ref: '#/components/parameters/mediaUuid'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Media'
          description: Media asset
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Get media
      tags:
      - Media
    put:
      description: Update the alt text of a media asset.
      operationId: updateMedia
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      - $ref: '#/components/parameters/mediaUuid'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/updateMedia_request'
        required: true
      responses:
        "200":
          $ref: '#/components/responses/SuccessResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Update media
      tags:
      - Media
  /{workspaceUuid}/media/chunked/initiate:
    post:
      description: |
        Start a chunked upload session for large files. Returns an `upload_uuid`,
        `chunk_size`, and `total_chunks` to use for subsequent chunk requests.
      operationId: initiateChunkedUpload
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/initiateChunkedUpload_request'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/initiateChunkedUpload_201_response'
          description: Chunked upload session details
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/ValidationError'
      summary: Initiate chunked upload
      tags:
      - Media
  /{workspaceUuid}/media/remote/initiate:
    post:
      description: |
        Download a file from a remote URL into the media library.
        For small files the media object is returned immediately.
        For large files a `download_id` is returned — poll the status endpoint.
      operationId: initiateRemoteUpload
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/initiateRemoteUpload_request'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/initiateRemoteUpload_201_response'
          description: Media object or download job
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/ValidationError'
      summary: Initiate remote upload
      tags:
      - Media
  /{workspaceUuid}/media/chunked/{uploadUuid}/upload:
    post:
      description: Upload a single chunk of a chunked upload session.
      operationId: uploadChunk
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      - explode: false
        in: path
        name: uploadUuid
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/uploadChunk_request'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/uploadChunk_201_response'
          description: Chunk received
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/ValidationError'
      summary: Upload a chunk
      tags:
      - Media
  /{workspaceUuid}/media/chunked/{uploadUuid}/complete:
    post:
      description: Signal that all chunks have been uploaded. Returns the final media
        object.
      operationId: completeChunkedUpload
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      - explode: false
        in: path
        name: uploadUuid
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Media'
          description: Completed media object
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/ValidationError'
      summary: Complete chunked upload
      tags:
      - Media
  /{workspaceUuid}/media/chunked/{uploadUuid}:
    delete:
      description: Cancel an in-progress chunked upload session and clean up uploaded
        chunks.
      operationId: abortChunkedUpload
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      - explode: false
        in: path
        name: uploadUuid
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "204":
          description: Upload aborted
        "401":
          $ref: '#/components/responses/Unauthorized'
      summary: Abort chunked upload
      tags:
      - Media
  /{workspaceUuid}/media/remote/{downloadId}/status:
    get:
      description: Poll the status of an in-progress remote media download.
      operationId: getRemoteUploadStatus
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      - explode: false
        in: path
        name: downloadId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getRemoteUploadStatus_200_response'
          description: Download status
        "401":
          $ref: '#/components/responses/Unauthorized'
      summary: Get remote upload status
      tags:
      - Media
  /{workspaceUuid}/tags:
    get:
      description: Returns all tags defined in the workspace.
      operationId: listTags
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listTags_200_response'
          description: List of tags
        "401":
          $ref: '#/components/responses/Unauthorized'
      summary: List tags
      tags:
      - Tags
    post:
      description: Creates a new color-coded tag in the workspace for organizing posts.
      operationId: createTag
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagInput'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
          description: Created tag
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/ValidationError'
      summary: Create tag
      tags:
      - Tags
  /{workspaceUuid}/tags/{tagUuid}:
    delete:
      description: Permanently deletes a tag. Posts that had this tag attached are
        unaffected.
      operationId: deleteTag
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      - $ref: '#/components/parameters/tagUuid'
      responses:
        "200":
          $ref: '#/components/responses/SuccessResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Delete tag
      tags:
      - Tags
    get:
      description: Returns a single tag by UUID.
      operationId: getTag
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      - $ref: '#/components/parameters/tagUuid'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
          description: Tag details
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Get tag
      tags:
      - Tags
    put:
      description: Updates a tag's name or color.
      operationId: updateTag
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      - $ref: '#/components/parameters/tagUuid'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagInput'
        required: true
      responses:
        "200":
          $ref: '#/components/responses/SuccessResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "422":
          $ref: '#/components/responses/ValidationError'
      summary: Update tag
      tags:
      - Tags
  /{workspaceUuid}/posts:
    delete:
      description: Delete multiple posts at once.
      operationId: deletePostsBulk
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/deletePostsBulk_request'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResult'
          description: Deletion result
        "401":
          $ref: '#/components/responses/Unauthorized'
      summary: Delete posts (bulk)
      tags:
      - Posts
    get:
      description: Returns a paginated list of posts in the workspace.
      operationId: listPosts
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listPosts_200_response'
          description: Paginated list of posts
        "401":
          $ref: '#/components/responses/Unauthorized'
      summary: List posts
      tags:
      - Posts
    post:
      description: |
        Create a new post. Use `schedule: true` with `date` and `time` to schedule,
        `schedule_now: true` to publish immediately, or `queue: true` to add to the
        smart publishing queue.
      operationId: createPost
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
          description: Created post
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/ValidationError'
      summary: Create post
      tags:
      - Posts
  /{workspaceUuid}/posts/{postUuid}:
    delete:
      description: Deletes a post. Use `delete_mode` to control whether to also remove
        the published content from social platforms.
      operationId: deletePost
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      - $ref: '#/components/parameters/postUuid'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/deletePost_request'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResult'
          description: Deletion result
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Delete post
      tags:
      - Posts
    get:
      description: Returns a single post with all its versions and associated accounts.
      operationId: getPost
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      - $ref: '#/components/parameters/postUuid'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
          description: Post details
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Get post
      tags:
      - Posts
    put:
      description: "Replaces a post's versions, accounts, tags, and scheduling options.\
        \ The post must not be in a published state."
      operationId: updatePost
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      - $ref: '#/components/parameters/postUuid'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostInput'
        required: true
      responses:
        "200":
          $ref: '#/components/responses/SuccessResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "422":
          $ref: '#/components/responses/ValidationError'
      summary: Update post
      tags:
      - Posts
  /{workspaceUuid}/posts/schedule/{postUuid}:
    post:
      description: "Schedule an existing post. Set `postNow: true` to publish immediately."
      operationId: schedulePost
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      - $ref: '#/components/parameters/postUuid'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/schedulePost_request'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleResult'
          description: Schedule confirmation
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Schedule post
      tags:
      - Posts
  /{workspaceUuid}/posts/add-to-queue/{postUuid}:
    post:
      description: Add an existing post to the smart publishing queue.
      operationId: addPostToQueue
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      - $ref: '#/components/parameters/postUuid'
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleResult'
          description: Queue confirmation
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Add post to queue
      tags:
      - Posts
  /{workspaceUuid}/posts/approve/{postUuid}:
    post:
      description: Approve a post that is pending review.
      operationId: approvePost
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      - $ref: '#/components/parameters/postUuid'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleResult'
          description: Approval confirmation
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Approve post
      tags:
      - Posts
  /panel/workspaces:
    delete:
      description: Permanently deletes one or more workspaces and all their associated
        data. Admin only.
      operationId: deleteWorkspacesBulk
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/deleteWorkspacesBulk_request'
        required: true
      responses:
        "200":
          $ref: '#/components/responses/SuccessResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
      summary: Delete workspaces (bulk)
      tags:
      - Workspaces
    get:
      description: Returns a paginated list of all workspaces. Admin only.
      operationId: listWorkspaces
      parameters:
      - explode: true
        in: query
        name: keyword
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: subscription_status
        required: false
        schema:
          enum:
          - active
          - trialing
          - past_due
          - paused
          - canceled
          - incomplete
          type: string
        style: form
      - explode: true
        in: query
        name: access_status
        required: false
        schema:
          enum:
          - subscription
          - unlimited
          - locked
          type: string
        style: form
      - description: Page number (15 items per page).
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listWorkspaces_200_response'
          description: Paginated list of workspaces
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
      summary: List workspaces
      tags:
      - Workspaces
    post:
      description: Create a new workspace. Admin only.
      operationId: createWorkspace
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceInput'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
          description: Created workspace
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "422":
          $ref: '#/components/responses/ValidationError'
      summary: Create workspace
      tags:
      - Workspaces
  /panel/workspaces/{workspaceUuid}:
    delete:
      description: Permanently deletes a single workspace and all its associated data.
        Admin only.
      operationId: deleteWorkspace
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      responses:
        "200":
          $ref: '#/components/responses/SuccessResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Delete workspace
      tags:
      - Workspaces
    get:
      description: Returns a single workspace by UUID including its subscription status.
        Admin only.
      operationId: getWorkspace
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
          description: Workspace details
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Get workspace
      tags:
      - Workspaces
    put:
      description: "Updates a workspace's name, color, or access status. Admin only."
      operationId: updateWorkspace
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceInput'
        required: true
      responses:
        "200":
          $ref: '#/components/responses/SuccessResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Update workspace
      tags:
      - Workspaces
  /panel/workspaces/{workspaceUuid}/users:
    delete:
      description: Removes a user's access to the workspace. The user account is not
        deleted. Admin only.
      operationId: removeUserFromWorkspace
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/removeUserFromWorkspace_request'
        required: true
      responses:
        "200":
          $ref: '#/components/responses/SuccessResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
      summary: Remove user from workspace
      tags:
      - Workspaces
    post:
      description: Adds an existing user to the workspace with a specified role. Admin
        only.
      operationId: addUserToWorkspace
      parameters:
      - $ref: '#/components/parameters/workspaceUuid'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceUserInput'
        required: true
      responses:
        "201":
          $ref: '#/components/responses/SuccessResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
